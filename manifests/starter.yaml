id: starter
name: Starter
description: |
  A compact preparedness kit — emergency medical reference, repair
  guides, post-disaster survival notes, food preparation, and
  appropriate-technology techniques. Roughly 5 GB; comfortably fits on
  a 32 GB SD card alongside the OS, your maps, and free space.
license_notes: |
  iFixit content is CC BY-NC-SA. Personal and educational use only;
  commercial redistribution (e.g. selling preloaded SD cards) is not
  permitted by the upstream license.

