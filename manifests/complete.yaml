id: complete
name: Complete
description: |
  The comprehensive set — full English Wikipedia (with images),
  Wikibooks, all medical references, repair guides, post-disaster and
  food-prep ZIMs, sustainable living wikis, and a Project Gutenberg
  literature slice. Roughly 130 GB; plan for an SSD ≥ 256 GB.
license_notes: |
  Includes content under varied licenses including CC BY-NC-SA (iFixit).
  Personal and educational use only; commercial redistribution is not
  permitted for the non-commercial-licensed items. See each item's
  source for full license terms.

