id: complete
name: Complete
description: |
  The comprehensive set — full English Wikipedia, all of Project Gutenberg,
  Khan Academy Lite, full Stack Exchange archives, complete medical and
  repair references, and global map coverage. Plan for several hundred GB
  on disk; recommended install target is a 1 TB+ SSD.
license_notes: |
  Includes content under varied licenses, including CC BY-NC-SA (Khan
  Academy, iFixit). Personal and educational use only — commercial
  redistribution is not permitted for the non-commercial-licensed items.
  See each item's source for full license terms.

